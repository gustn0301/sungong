<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>순공 스톱워치</title>

<!-- SVG Favicon: 어두운 배경에 흰 시계 바늘 원형 -->
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='17' r='13' fill='%23111827' stroke='%23ffffff' stroke-width='2'/%3E%3Ccircle cx='16' cy='17' r='1.5' fill='%23ffffff'/%3E%3Cline x1='16' y1='17' x2='16' y2='8' stroke='%23ffffff' stroke-width='2' stroke-linecap='round'/%3E%3Cline x1='16' y1='17' x2='22' y2='20' stroke='%23cccccc' stroke-width='1.5' stroke-linecap='round'/%3E%3Crect x='13' y='1' width='6' height='3' rx='1.5' fill='%23ffffff'/%3E%3C/svg%3E" />

<!-- 고급 숫자 전용 폰트: DM Mono (두껍고 정돈된 모노 숫자) + Outfit (UI용) -->
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet" />

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --font-num: 'DM Mono', monospace;
    --font-ui:  'Outfit', sans-serif;
  }

  body {
    font-family: var(--font-ui);
    background: #0d0d0d;
    width: 100vw; height: 100vh;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
  }

  /* ── 배경 ── */
  #bg-layer {
    position: fixed; inset: 0; z-index: 0;
    background: #111827;
    background-image: radial-gradient(ellipse at 25% 35%, #1c2333 0%, #0d0d0d 100%);
  }
  #bg-layer img {
    width: 100%; height: 100%;
    object-fit: cover;
    filter: brightness(0.60);
    display: block;
  }

  /* ── 메인 앱 ── */
  #app {
    position: relative; z-index: 1;
    width: 100vw; height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 0;
  }

  /* ── 스톱워치 숫자 ── */
  #stopwatch-display {
    font-family: var(--font-num);
    font-weight: 500;
    font-size: clamp(56px, 12vw, 140px);
    color: #fff;
    text-align: center;
    letter-spacing: -0.01em;
    text-shadow:
      0 0 60px rgba(255,255,255,0.06),
      0 2px 24px rgba(0,0,0,0.6);
    cursor: pointer;
    transition: color 1s ease;
    line-height: 1;
    padding: 0 24px;
  }

  /* 시작 전 안내 텍스트 */
  #sw-hint {
    font-family: var(--font-ui);
    font-size: 13px;
    font-weight: 300;
    color: rgba(255,255,255,0.35);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-top: 28px;
  }

  /* ── 시작 버튼 (시작 전에만 표시) ── */
  #start-btn {
    margin-top: 36px;
    font-family: var(--font-ui);
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 13px 52px;
    border-radius: 50px;
    border: 1px solid rgba(255,255,255,0.35);
    background: rgba(255,255,255,0.07);
    color: rgba(255,255,255,0.9);
    cursor: pointer;
    backdrop-filter: blur(8px);
    transition: background 0.2s, border-color 0.2s, transform 0.1s;
  }
  #start-btn:hover  { background: rgba(255,255,255,0.14); border-color: rgba(255,255,255,0.6); }
  #start-btn:active { transform: scale(0.97); }

  /* ── 정지 상태 컨트롤 ── */
  #pause-controls {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    margin-top: 40px;
  }
  #pause-controls.visible { display: flex; }

  .ctrl-btn {
    font-family: var(--font-ui);
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 11px 40px;
    border-radius: 50px;
    border: 1px solid rgba(255,255,255,0.3);
    background: rgba(255,255,255,0.07);
    color: rgba(255,255,255,0.9);
    cursor: pointer;
    backdrop-filter: blur(6px);
    transition: background 0.2s, transform 0.1s;
    min-width: 200px;
    text-align: center;
  }
  .ctrl-btn:hover  { background: rgba(255,255,255,0.14); }
  .ctrl-btn:active { transform: scale(0.97); }
  .ctrl-btn.danger { border-color: rgba(255,80,80,0.4); color: rgba(255,160,160,0.9); }
  .ctrl-btn.danger:hover { background: rgba(180,30,30,0.22); }

  /* ── 우측 상단 타이머 버튼 ── */
  #timer-toggle-btn {
    position: fixed; top: 22px; right: 22px; z-index: 50;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.22);
    color: rgba(255,255,255,0.75);
    font-family: var(--font-ui);
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 9px 20px;
    border-radius: 50px;
    cursor: pointer;
    backdrop-filter: blur(8px);
    transition: background 0.2s, color 0.2s;
  }
  #timer-toggle-btn:hover { background: rgba(255,255,255,0.14); color: #fff; }

  /* ── 좌측 하단 배경 버튼 ── */
  #bg-btn {
    position: fixed; bottom: 24px; left: 24px; z-index: 50;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.18);
    color: rgba(255,255,255,0.5);
    font-family: var(--font-ui);
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 8px 18px;
    border-radius: 50px;
    cursor: pointer;
    backdrop-filter: blur(6px);
    transition: background 0.2s, color 0.2s;
  }
  #bg-btn:hover { background: rgba(255,255,255,0.12); color: rgba(255,255,255,0.85); }
  #bg-input { display: none; }

  /* ══ PIP 타이머 ══ */
  #timer-pip {
    display: none;
    position: fixed;
    top: 66px; right: 22px;
    z-index: 200;
    width: 296px;
    background: rgba(8,8,16,0.88);
    border: 1px solid rgba(255,255,255,0.14);
    border-radius: 20px;
    backdrop-filter: blur(20px);
    padding: 22px 20px 20px;
    color: #fff;
    box-shadow: 0 12px 48px rgba(0,0,0,0.6);
  }
  #timer-pip.visible { display: block; }

  #pip-close {
    position: absolute; top: 12px; right: 16px;
    background: none; border: none;
    color: rgba(255,255,255,0.35);
    font-size: 16px; cursor: pointer;
    font-family: var(--font-ui);
    transition: color 0.2s;
    line-height: 1;
  }
  #pip-close:hover { color: rgba(255,255,255,0.8); }

  #pip-title {
    font-family: var(--font-ui);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.18em;
    color: rgba(255,255,255,0.35);
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  #preset-row {
    display: flex; flex-wrap: wrap; gap: 6px;
    margin-bottom: 14px;
  }
  .preset-btn {
    font-family: var(--font-ui);
    font-size: 11px;
    font-weight: 400;
    padding: 5px 11px;
    border-radius: 50px;
    border: 1px solid rgba(255,255,255,0.18);
    background: rgba(255,255,255,0.05);
    color: rgba(255,255,255,0.6);
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s, color 0.15s;
    letter-spacing: 0.04em;
  }
  .preset-btn:hover { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.9); }
  .preset-btn.active {
    background: rgba(255,255,255,0.15);
    border-color: rgba(255,255,255,0.5);
    color: #fff;
  }

  #custom-time-row {
    display: none;
    align-items: center;
    gap: 4px;
    margin-bottom: 14px;
    justify-content: center;
  }
  #custom-time-row.visible { display: flex; }

  .time-input {
    width: 44px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 8px;
    color: #fff;
    font-family: var(--font-num);
    font-size: 18px;
    font-weight: 500;
    text-align: center;
    padding: 4px 2px;
    outline: none;
    -moz-appearance: textfield;
  }
  .time-input::-webkit-outer-spin-button,
  .time-input::-webkit-inner-spin-button { -webkit-appearance: none; }
  .time-input:focus { border-color: rgba(255,255,255,0.55); }
  .time-sep {
    font-family: var(--font-num);
    font-size: 20px;
    opacity: 0.4;
    margin-bottom: 2px;
  }

  #timer-display {
    font-family: var(--font-num);
    font-weight: 500;
    font-size: 44px;
    text-align: center;
    letter-spacing: -0.01em;
    margin: 4px 0 16px;
    text-shadow: 0 0 24px rgba(255,255,255,0.1);
  }
  #timer-display.warning { color: #f59e47; }
  #timer-display.done    { color: #f04747; animation: blink 0.65s infinite alternate; }
  @keyframes blink { from { opacity: 1; } to { opacity: 0.35; } }

  #timer-btn-row {
    display: flex; gap: 8px; justify-content: center;
    flex-wrap: wrap;
  }
  .pip-btn {
    font-family: var(--font-ui);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.09em;
    text-transform: uppercase;
    padding: 8px 20px;
    border-radius: 50px;
    border: 1px solid rgba(255,255,255,0.22);
    background: rgba(255,255,255,0.07);
    color: rgba(255,255,255,0.85);
    cursor: pointer;
    transition: background 0.15s;
  }
  .pip-btn:hover { background: rgba(255,255,255,0.15); }
  .pip-btn.primary {
    background: rgba(99,179,237,0.15);
    border-color: rgba(99,179,237,0.45);
    color: rgba(180,220,255,0.95);
  }
  .pip-btn.primary:hover { background: rgba(99,179,237,0.28); }

  #timer-done-msg {
    display: none;
    text-align: center;
    font-family: var(--font-ui);
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0.1em;
    color: #f59e47;
    margin-top: 10px;
  }

  /* ── 로그인 오버레이 ── */
  #login-overlay {
    position: fixed; inset: 0; z-index: 1000;
    background: #0d0d0d;
    display: flex; align-items: center; justify-content: center;
    transition: opacity 0.45s;
  }
  #login-overlay.hidden { opacity: 0; pointer-events: none; }
  #login-overlay .inner { text-align: center; color: #fff; }

  #login-overlay h2 {
    font-family: var(--font-num);
    font-size: 28px;
    font-weight: 500;
    letter-spacing: 0.04em;
    margin-bottom: 10px;
    color: rgba(255,255,255,0.9);
  }
  #login-status {
    font-family: var(--font-ui);
    font-size: 12px;
    font-weight: 300;
    letter-spacing: 0.1em;
    opacity: 0.45;
    margin-bottom: 4px;
    text-transform: uppercase;
  }
  #login-error {
    font-family: var(--font-ui);
    font-size: 11px;
    color: #f87171;
    margin-top: 10px;
    min-height: 16px;
    max-width: 280px;
    line-height: 1.5;
  }

  .spinner {
    width: 32px; height: 32px;
    border: 2px solid rgba(255,255,255,0.12);
    border-top-color: rgba(255,255,255,0.7);
    border-radius: 50%;
    animation: spin 0.75s linear infinite;
    margin: 20px auto 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  #offline-btn {
    display: none;
    margin-top: 24px;
    font-family: var(--font-ui);
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 11px 32px;
    border-radius: 50px;
    border: 1px solid rgba(255,255,255,0.3);
    background: rgba(255,255,255,0.07);
    color: rgba(255,255,255,0.8);
    cursor: pointer;
    transition: background 0.2s;
  }
  #offline-btn:hover { background: rgba(255,255,255,0.14); }
</style>
</head>
<body>

<div id="bg-layer"><div id="bg-img-wrap"></div></div>

<!-- 로그인 오버레이 -->
<div id="login-overlay">
  <div class="inner">
    <h2>순공 스톱워치</h2>
    <p id="login-status">로그인 중</p>
    <div id="login-error"></div>
    <div class="spinner" id="login-spinner"></div>
    <button id="offline-btn">오프라인으로 시작</button>
  </div>
</div>

<!-- 우측 상단 타이머 버튼 -->
<button id="timer-toggle-btn">타이머</button>

<!-- 메인 앱 -->
<div id="app">
  <div id="stopwatch-display">00:00.00</div>
  <div id="sw-hint">화면을 탭하면 모드 전환 · 두 번 탭하면 정지</div>

  <!-- 시작 전에만 표시되는 시작 버튼 -->
  <button id="start-btn">시작</button>

  <!-- 정지 후 표시 -->
  <div id="pause-controls">
    <button class="ctrl-btn" id="resume-btn">계속하기</button>
    <button class="ctrl-btn danger" id="reset-btn">초기화</button>
  </div>
</div>

<!-- 좌측 하단 배경 버튼 -->
<button id="bg-btn">배경 변경</button>
<input type="file" id="bg-input" accept="image/*" />

<!-- PIP 타이머 -->
<div id="timer-pip">
  <button id="pip-close">✕</button>
  <div id="pip-title">Timer</div>

  <div id="preset-row">
    <button class="preset-btn" data-sec="4800">국어 1:20</button>
    <button class="preset-btn" data-sec="6000">수학 1:40</button>
    <button class="preset-btn" data-sec="4200">영어 1:10</button>
    <button class="preset-btn" data-sec="custom">사용자 지정</button>
  </div>

  <div id="custom-time-row">
    <input class="time-input" id="ct-h" type="number" min="0" max="23" value="0" />
    <span class="time-sep">:</span>
    <input class="time-input" id="ct-m" type="number" min="0" max="59" value="0" />
    <span class="time-sep">:</span>
    <input class="time-input" id="ct-s" type="number" min="1" max="59" value="1" />
  </div>

  <div id="timer-display">--:--:--</div>
  <div id="timer-done-msg">시간 종료</div>
  <div id="timer-btn-row"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInAnonymously, onAuthStateChanged }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getStorage, ref as storageRef, uploadBytes, getDownloadURL }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

// ── DOM refs ────────────────────────────────────────────
const loginOverlay  = document.getElementById('login-overlay');
const loginStatus   = document.getElementById('login-status');
const loginError    = document.getElementById('login-error');
const loginSpinner  = document.getElementById('login-spinner');
const offlineBtn    = document.getElementById('offline-btn');
const bgImgWrap     = document.getElementById('bg-img-wrap');
const swDisplay     = document.getElementById('stopwatch-display');
const swHint        = document.getElementById('sw-hint');
const startBtn      = document.getElementById('start-btn');
const pauseControls = document.getElementById('pause-controls');
const resumeBtn     = document.getElementById('resume-btn');
const resetBtn      = document.getElementById('reset-btn');
const bgBtn         = document.getElementById('bg-btn');
const bgInput       = document.getElementById('bg-input');
const timerToggleBtn= document.getElementById('timer-toggle-btn');
const timerPip      = document.getElementById('timer-pip');
const pipClose      = document.getElementById('pip-close');
const presetBtns    = document.querySelectorAll('.preset-btn');
const customRow     = document.getElementById('custom-time-row');
const ctH           = document.getElementById('ct-h');
const ctM           = document.getElementById('ct-m');
const ctS           = document.getElementById('ct-s');
const timerDisplay  = document.getElementById('timer-display');
const timerDoneMsg  = document.getElementById('timer-done-msg');
const timerBtnRow   = document.getElementById('timer-btn-row');
const appEl         = document.getElementById('app');

// ── Firebase ────────────────────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyC8bC-J22KDp3oAEhKVmM5EX__iy8lHlag",
  authDomain: "dgpallete.firebaseapp.com",
  projectId: "dgpallete",
  storageBucket: "dgpallete.firebasestorage.app",
  messagingSenderId: "121932121210",
  appId: "1:121932121210:web:839213781d7c02d0dce7c3"
};

let uid     = null;
let db      = null;
let storage = null;
let fbReady = false;

// 5초 후 오프라인 버튼 노출
const loginTimeout = setTimeout(() => {
  if (!fbReady) {
    loginError.textContent =
      '연결이 지연되고 있어요. Firebase 콘솔에서 익명 로그인(Anonymous)이 활성화되어 있는지 확인해 주세요.';
    offlineBtn.style.display = 'inline-block';
    loginSpinner.style.display = 'none';
  }
}, 5000);

offlineBtn.addEventListener('click', () => enterApp());

function enterApp() {
  clearTimeout(loginTimeout);
  fbReady = true;
  loginOverlay.classList.add('hidden');
  setTimeout(() => { loginOverlay.style.display = 'none'; }, 450);
  loadLocalState();
  // 이전에 시간이 기록돼 있으면 정지 상태로 표시, 없으면 시작 버튼 대기
  if (swElapsed > 0) {
    renderSW(swElapsed);
    showPauseControls(); // 종료 전 시간이 있으면 정지 상태로 복원
  } else {
    renderSW(0);
    showStartButton();
  }
}

// ── 데이터 저장/로드 ────────────────────────────────────
async function loadUserData() {
  if (!db || !uid) return;
  try {
    const snap = await getDoc(doc(db, 'users', uid));
    if (snap.exists()) {
      const d = snap.data();
      if (d.bgURL)             applyBgURL(d.bgURL);
      if (d.swElapsed != null) swElapsed = d.swElapsed;
      if (d.swUninterrupted != null) swUninterrupted = d.swUninterrupted;
    }
  } catch(e) {
    console.warn('Firestore 읽기 실패:', e.message);
    loadLocalState();
  }
}

function loadLocalState() {
  try {
    const s = JSON.parse(localStorage.getItem('sw_state') || '{}');
    if (s.swElapsed != null)       swElapsed       = s.swElapsed;
    if (s.swUninterrupted != null) swUninterrupted = s.swUninterrupted;
    if (s.bgDataURL)               applyBgDataURL(s.bgDataURL);
  } catch(e) {}
}

async function saveData(extra = {}) {
  try {
    const prev = JSON.parse(localStorage.getItem('sw_state') || '{}');
    localStorage.setItem('sw_state', JSON.stringify({
      ...prev, swElapsed, swUninterrupted, ...extra
    }));
  } catch(e) {}
  if (!db || !uid) return;
  try {
    await setDoc(doc(db, 'users', uid), {
      swElapsed, swUninterrupted, ...extra
    }, { merge: true });
  } catch(e) { console.warn('Firestore 저장 실패:', e.message); }
}

// Firebase 초기화
try {
  const fbApp = initializeApp(firebaseConfig);
  const auth  = getAuth(fbApp);
  db      = getFirestore(fbApp);
  storage = getStorage(fbApp);

  loginStatus.textContent = '익명 로그인 중';
  signInAnonymously(auth).catch(e => {
    loginError.textContent = '로그인 실패: ' + e.message;
    offlineBtn.style.display = 'inline-block';
    loginSpinner.style.display = 'none';
  });

  onAuthStateChanged(auth, async user => {
    if (!user) return;
    uid = user.uid;
    loginStatus.textContent = '데이터 불러오는 중';
    await loadUserData();
    enterApp();
  });
} catch(e) {
  loginError.textContent = 'Firebase 오류: ' + e.message;
  offlineBtn.style.display = 'inline-block';
  loginSpinner.style.display = 'none';
}

// ── 스톱워치 상태 ───────────────────────────────────────
let swElapsed       = 0;
let swRunning       = false;
let swStartedAt     = null;
let swInterval      = null;
let swPaused        = false;
let swCompact       = false;
let swUninterrupted = true;
let swEverStarted   = false;  // 사용자가 한 번이라도 시작 눌렀는지

let tapCount = 0;
let tapTimer = null;
const DBL_TAP_MS = 380;

// ── UI 상태 전환 헬퍼 ────────────────────────────────────
function showStartButton() {
  startBtn.style.display    = 'inline-block';
  swHint.style.display      = 'none';
  pauseControls.classList.remove('visible');
}

function hideStartButton() {
  startBtn.style.display = 'none';
  swHint.style.display   = 'block';
}

function showPauseControls() {
  hideStartButton();
  pauseControls.classList.add('visible');
}

function hidePauseControls() {
  pauseControls.classList.remove('visible');
}

// ── 스톱워치 제어 ────────────────────────────────────────
function startStopwatch() {
  if (swRunning) return;
  swEverStarted = true;
  swRunning     = true;
  swPaused      = false;
  swStartedAt   = Date.now() - swElapsed;
  swInterval    = setInterval(tickSW, 33);
  hideStartButton();
  hidePauseControls();
}

function pauseStopwatch() {
  if (!swRunning) return;
  swRunning       = false;
  swUninterrupted = false;
  clearInterval(swInterval);
  swElapsed = Date.now() - swStartedAt;
  swPaused  = true;
  showPauseControls();
  saveData();
}

function resetStopwatch() {
  clearInterval(swInterval);
  swRunning       = false;
  swElapsed       = 0;
  swPaused        = false;
  swStartedAt     = null;
  swUninterrupted = true;
  swEverStarted   = false;
  swDisplay.style.color = '#fff';
  renderSW(0);
  saveData();
  showStartButton();
}

function tickSW() {
  swElapsed = Date.now() - swStartedAt;
  renderSW(swElapsed);
  colorSW(swElapsed);
}

function renderSW(ms) {
  const totalSec = Math.floor(ms / 1000);
  const hrs  = Math.floor(totalSec / 3600);
  const mins = Math.floor((totalSec % 3600) / 60);
  const secs = totalSec % 60;
  const mils = Math.floor((ms % 1000) / 10);

  if (swCompact) {
    swDisplay.textContent =
      `${String(hrs).padStart(2,'0')}:${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}`;
  } else {
    const m   = String(mins).padStart(2,'0');
    const s   = String(secs).padStart(2,'0');
    const ms2 = String(mils).padStart(2,'0');
    swDisplay.textContent = hrs > 0
      ? `${hrs}:${m}:${s}.${ms2}`
      : `${m}:${s}.${ms2}`;
  }
}

function colorSW(ms) {
  if (!swUninterrupted) { swDisplay.style.color = '#fff'; return; }
  const m30 = 30 * 60 * 1000;
  const m60 = 60 * 60 * 1000;
  if (ms < m30) {
    swDisplay.style.color = '#fff';
  } else {
    const t = Math.min((ms - m30) / (m60 - m30), 1);
    const g = Math.round(255 * (1 - t * 0.95));
    const b = Math.round(255 * (1 - t * 0.95));
    swDisplay.style.color = `rgb(255,${g},${b})`;
  }
}

// ── 시작 버튼 ────────────────────────────────────────────
startBtn.addEventListener('click', e => {
  e.stopPropagation();
  startStopwatch();
});

// ── 탭 감지 (시작 후에만) ───────────────────────────────
appEl.addEventListener('click', e => {
  if (e.target.closest('#timer-pip') ||
      e.target.closest('#timer-toggle-btn') ||
      e.target.closest('#bg-btn') ||
      e.target.closest('#pause-controls') ||
      e.target.closest('#start-btn')) return;

  // 아직 한 번도 시작 안 했으면 무시
  if (!swEverStarted && !swPaused) return;

  tapCount++;
  clearTimeout(tapTimer);

  if (tapCount === 1) {
    tapTimer = setTimeout(() => {
      // 싱글 탭: 실행 중일 때만 모드 전환
      if (swRunning) {
        swCompact = !swCompact;
        renderSW(swElapsed);
      }
      tapCount = 0;
    }, DBL_TAP_MS);
  } else if (tapCount >= 2) {
    tapCount = 0;
    clearTimeout(tapTimer);
    if (swRunning) {
      pauseStopwatch();
    } else if (swPaused) {
      startStopwatch();
    }
  }
});

resumeBtn.addEventListener('click', e => {
  e.stopPropagation();
  if (swPaused) startStopwatch();
});

resetBtn.addEventListener('click', e => {
  e.stopPropagation();
  if (confirm('스톱워치를 초기화하시겠습니까?')) resetStopwatch();
});

window.addEventListener('beforeunload', () => {
  if (swRunning) swElapsed = Date.now() - swStartedAt;
  saveData();
});

// ── 배경 이미지 ──────────────────────────────────────────
bgBtn.addEventListener('click', () => bgInput.click());

bgInput.addEventListener('change', async e => {
  const file = e.target.files[0];
  if (!file) return;
  bgBtn.textContent = '업로드 중';

  const reader = new FileReader();
  reader.onload = ev => {
    applyBgDataURL(ev.target.result);
    try { saveData({ bgDataURL: ev.target.result }); } catch(e2) {}
  };
  reader.readAsDataURL(file);

  if (storage && uid) {
    try {
      const sRef = storageRef(storage, `backgrounds/${uid}/bg.jpg`);
      await uploadBytes(sRef, file);
      const url = await getDownloadURL(sRef);
      await saveData({ bgURL: url });
    } catch(err) { console.warn('Storage 업로드 실패:', err.message); }
  }
  bgBtn.textContent = '배경 변경';
});

function applyBgURL(url) {
  bgImgWrap.innerHTML = '';
  const img = document.createElement('img');
  img.src = url;
  bgImgWrap.appendChild(img);
}
function applyBgDataURL(dataURL) {
  bgImgWrap.innerHTML = '';
  const img = document.createElement('img');
  img.src = dataURL;
  bgImgWrap.appendChild(img);
}

// ── 타이머 PIP ──────────────────────────────────────────
timerToggleBtn.addEventListener('click', () => {
  timerPip.classList.toggle('visible');
});
pipClose.addEventListener('click', () => timerPip.classList.remove('visible'));

let timerPresetSec      = 0;
let timerRemaining      = 0;
let timerRunning        = false;
let timerPaused         = false;
let timerStartedAt      = null;
let timerElapsedAtPause = 0;
let timerInterval       = null;
let timerBeepInterval   = null;

presetBtns.forEach(btn => {
  btn.addEventListener('click', () => {
    presetBtns.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const sec = btn.dataset.sec;
    if (sec === 'custom') {
      customRow.classList.add('visible');
      timerPresetSec = getCustomSec();
    } else {
      customRow.classList.remove('visible');
      timerPresetSec = parseInt(sec);
    }
    renderTimerDisplay(timerPresetSec);
    resetTimerState();
  });
});

[ctH, ctM, ctS].forEach(inp => {
  inp.addEventListener('input', () => {
    timerPresetSec = getCustomSec();
    renderTimerDisplay(timerPresetSec);
  });
});

function getCustomSec() {
  const h = Math.min(23, Math.max(0, parseInt(ctH.value)||0));
  const m = Math.min(59, Math.max(0, parseInt(ctM.value)||0));
  const s = Math.min(59, Math.max(1, parseInt(ctS.value)||1));
  return h*3600 + m*60 + s;
}

function renderTimerDisplay(sec) {
  if (!sec && sec !== 0) { timerDisplay.textContent = '--:--:--'; return; }
  const h = Math.floor(sec / 3600);
  const m = Math.floor((sec % 3600) / 60);
  const s = sec % 60;
  timerDisplay.textContent =
    `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

function resetTimerState() {
  clearInterval(timerInterval);
  clearInterval(timerBeepInterval);
  timerRunning = false;
  timerPaused  = false;
  timerElapsedAtPause = 0;
  timerRemaining = timerPresetSec;
  timerDisplay.className = '';
  timerDoneMsg.style.display = 'none';
  renderBtnIdle();
}

function renderBtnIdle() {
  timerBtnRow.innerHTML = '';
  if (timerPresetSec > 0) timerBtnRow.appendChild(mkBtn('시작', 'primary', startTimer));
}
function renderBtnRunning() {
  timerBtnRow.innerHTML = '';
  timerBtnRow.appendChild(mkBtn('정지', '', pauseTimer));
}
function renderBtnPaused() {
  timerBtnRow.innerHTML = '';
  timerBtnRow.appendChild(mkBtn('계속하기', 'primary', resumeTimer));
  timerBtnRow.appendChild(mkBtn('재설정', '', () => {
    resetTimerState();
    renderTimerDisplay(timerPresetSec);
  }));
}

function mkBtn(label, cls, fn) {
  const b = document.createElement('button');
  b.className = 'pip-btn' + (cls ? ' '+cls : '');
  b.textContent = label;
  b.addEventListener('click', fn);
  return b;
}

function startTimer() {
  if (!timerPresetSec) return;
  timerRemaining = timerPresetSec - timerElapsedAtPause;
  if (timerRemaining <= 0) { timerRemaining = timerPresetSec; timerElapsedAtPause = 0; }
  timerRunning   = true;
  timerPaused    = false;
  timerStartedAt = Date.now();
  timerDisplay.className = '';
  timerDoneMsg.style.display = 'none';
  clearInterval(timerInterval);
  timerInterval = setInterval(tickTimer, 250);
  renderBtnRunning();
}

function pauseTimer() {
  clearInterval(timerInterval);
  timerRunning = false;
  timerPaused  = true;
  const elapsed = Math.floor((Date.now() - timerStartedAt) / 1000);
  timerElapsedAtPause += elapsed;
  renderBtnPaused();
}

function resumeTimer() { startTimer(); }

function tickTimer() {
  const elapsed   = Math.floor((Date.now() - timerStartedAt) / 1000);
  const remaining = timerRemaining - elapsed;

  if (remaining <= 0) {
    clearInterval(timerInterval);
    timerRunning = false;
    timerElapsedAtPause = 0;
    renderTimerDisplay(0);
    timerDisplay.className = 'done';
    timerDoneMsg.style.display = 'block';
    beepAlarm();
    timerBtnRow.innerHTML = '';
    timerBtnRow.appendChild(mkBtn('재설정', '', () => {
      clearInterval(timerBeepInterval);
      resetTimerState();
      renderTimerDisplay(timerPresetSec);
    }));
    return;
  }
  timerDisplay.className = remaining <= 600 ? 'warning' : '';
  renderTimerDisplay(remaining);
}

function beepAlarm() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const beep = () => {
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.frequency.value = 880;
      g.gain.setValueAtTime(0.28, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.38);
      o.start(); o.stop(ctx.currentTime + 0.38);
    };
    beep();
    let cnt = 0;
    timerBeepInterval = setInterval(() => {
      if (++cnt >= 4) clearInterval(timerBeepInterval);
      beep();
    }, 750);
  } catch(e) {}
}

// 초기 UI
showStartButton();
</script>
